<!DOCTYPE html>
<html>

    <style>

            padding: 15px;

        }

        nav {

            text-align: center;
        }

        nav a {

            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {

        }

            width: 200px;

<nav>

<section>

        <li>HTML</li>
        <li>CSS</li>
        <li>Git</li>

<section>

        Name:<br>
